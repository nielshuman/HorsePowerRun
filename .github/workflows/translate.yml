# .github/workflows/translate.yml
name: Auto Translate NL → EN

on:
  push:
    branches:
      - master
    paths:
      - 'nl/**/*.md'
concurrency:
  group: auto-translate
  cancel-in-progress: false   # ← wait, don't cancel

jobs:
  translate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed NL files
        id: changes
        run: |
          git diff --name-only HEAD~1 HEAD | grep '^nl/.*\.md$' > nl_files.txt || true
          cat nl_files.txt

      - name: Stop if no changes
        run: |
          if [ ! -s nl_files.txt ]; then
            echo "No NL changes"
            exit 0
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install openai

      - name: Run translation
        run: node scripts/translate.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      
      - name: Commit & push to PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create or switch to the branch
          git fetch origin auto-translate-en || true
          git checkout auto-translate-en 2>/dev/null || git checkout -b auto-translate-en
          
          # Merge any master changes in
          git merge master --no-edit
          
          # Stage and commit translations
          git add en/
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Auto-translate NL changes (${{ github.sha }})"
          git push origin auto-translate-en
      
      - name: Create PR if it doesn't exist
        uses: peter-evans/create-pull-request@v6
        with:
          base: master
          branch: auto-translate-en
          title: "🌍 Auto-translated EN updates"
          body: |
            ⚠️ These translations were generated automatically.
            Please review before merging.
          labels: auto-translation
