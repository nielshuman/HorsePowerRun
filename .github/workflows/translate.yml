name: Auto Translate NL → EN

on:
  push:
    paths:
      - "nl/**/*.md"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: translate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Fetch all branches
        run: git fetch origin

      - name: Checkout or create auto-translate branch
        run: |
          if git show-ref --quiet refs/remotes/origin/auto-translate; then
            git checkout -B auto-translate origin/auto-translate
          else
            git checkout -b auto-translate
          fi

      - name: Determine changed NL markdown files
        run: |
          git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
            | grep '^nl/.*\.md$' > nl_files.txt || true

          echo "Changed files:"
          cat nl_files.txt || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install openai
        run: npm install openai

      - name: Run translation script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/translate.js

      - name: Commit changes (append, no overwrite)
        run: |
          if ! git diff --quiet; then
            git add en/
            git commit -m "Auto-translate: update EN files from NL changes"
            git push origin auto-translate
          else
            echo "No changes to commit"
          fi

      - name: Create or update pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto-translate
          base: master
          title: "Auto translations (NL → EN)"
          body: |
            This PR contains automated translations from `nl/` to `en/`.

            - Incremental commits (no force push)
            - Only changed NL files processed
            - PR is continuously updated
          labels: translation, automated
