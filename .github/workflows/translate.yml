name: Auto Translate NL → EN

on:
  push:
    branches:
      - master
    paths:
      - 'nl/**/*.md'

concurrency:
  group: auto-translate
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed NL files
        id: changes
        run: |
          git diff --name-only HEAD~1 HEAD | grep '^nl/.*\.md$' > nl_files.txt || true
          cat nl_files.txt

      - name: Stop if no changes
        run: |
          if [ ! -s nl_files.txt ]; then
            echo "No NL changes"
            exit 0
          fi

      - name: Prepare PR branch
        run: |
          git fetch origin auto-translate-en || true
          if git ls-remote --exit-code origin auto-translate-en; then
            cp nl_files.txt /tmp/nl_files.txt
            git checkout -f -b auto-translate-en origin/auto-translate-en
            cp /tmp/nl_files.txt nl_files.txt
          fi

          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install openai

      - name: Run translation
        run: node scripts/translate.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit & create PR
        uses: peter-evans/create-pull-request@v6
        with:
          base: master
          branch: auto-translate-en
          title: "🌍 Auto-translated EN updates"
          body: |
            ⚠️ These translations were generated automatically.
            Please review before merging.
          labels: auto-translation
          commit-message: "Auto-translate NL changes (${{ github.sha }})"
          add-paths: |
            en/
