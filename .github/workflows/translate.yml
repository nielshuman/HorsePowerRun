name: Auto Translate NL → EN

on:
  push:
    paths:
      - "nl/**/*.md"

permissions:
  contents: write
  pull-requests: write

jobs:
  translate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin master

      - name: Determine changed NL markdown files
        run: |
          git diff --name-only origin/master...HEAD \
            | grep '^nl/.*\.md$' > nl_files.txt || true

          echo "Changed files:"
          cat nl_files.txt || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install openai

      - name: Run translation script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/translate.js

      - name: Create or update pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto-translate
          base: master
          title: "Auto translations (NL → EN)"
          body: |
            Automatische translations van `nl/` naar `en/`. Gemaakt door openai, goed checken dus!
          commit-message: "Auto translation update"
          add-paths: |
            en/
          labels: |
            translation
            automated
