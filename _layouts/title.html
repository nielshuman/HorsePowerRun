<!DOCTYPE html>
<html lang="{% if page.url contains "/nl/" %}nl{% endif %}{% if page.url contains "/en/" %}en{% endif %}">
  <head>
    <title>{{site.title}}</title>
    {% include head.html %}
    <link rel="stylesheet" type="text/css" href="/assets/css/flipdown.css">
    <script type="text/javascript" src="/assets/js/flipdown.js"></script>
  </head>
  <body>
    {% include header.html %}
    <div id="banner">
      <div class="dark_overlay">
        <div id="header_content" class="align-items-center text-center">
          <h1 class="text white font-weight-bold">{{site.title}}</h1>
          <div id="countdown_wrapper">
            <div id="countdown" class="flipdown"></div>
          </div>
        </div>
      </div>
    </div>
    <section id="about">
      <div class="container">
        <div class="row">
          <div class="col-lg-10 mx-auto">
            {{content}}
          </div>
        </div>
      </div>
    </section>
    {% include footer.html %}
    <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>
  </body>
  {% include countdownscript.html %}
</html>
