<style>
.flex-container {
  display: flex;
  flex-flow: row wrap;
  justify-content: space-between;
}

.flex-item {
  margin: auto;
}
</style>

<div class="flex-container">
  {% for sponsor in site.data.sponsors %}
    <div class="flex-item">
      <img src="{{sponsor}}" alt="{{ sponsor }}" class="img-responsive" />
    </div>
  {% endfor %}
</div>
