<style>
  .slide > img {
    /* width: 100px; */
    height: 50px;
    animation: scroll 200s linear infinite;
    max-width: none;
  }

  .slide-track {
  width: 100%;
  display: flex;
  gap: 3em;
  overflow: hidden;
  /* Add these properties for the fade effect */
  -webkit-mask-image: linear-gradient(
    to right,
    transparent 0%,
    black 10%,
    black 90%,
    transparent 100%
  );
  mask-image: linear-gradient(
    to right,
    transparent 0%,
    black 10%,
    black 90%,
    transparent 100%
  );
}

  .slider {
    /* margin-top: 70px; */
    /* background-color: whitesmokea */
    /* padding: 8em 2em; */
  }

  @keyframes scroll {
    0% {transform:  (0);}
    100% {transform: translatex(-10000px)}
  }
</style>

<div class="slider">
  <div class="slide-track">
    {% for i in (</div>1..8) %}
      {% for sponsor in site.data.sponsors %}
        <div class="slide">
          <img src="{{sponsor}}" alt="{{ sponsor }}" />
        </div>
      {% endfor %}
    {% endfor %}
  </div>
</div>
