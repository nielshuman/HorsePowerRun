<style>
  .slide > img {
    width: 100px;
    height: 100px;
    animation: scroll 60s linear infinite;
  }

  .slide-track {
    width: 100%;
    display: flex;
    gap: 3em;
    overflow: hidden;
  }

  .slider {
    margin-top: 70px;
    background-color: whitesmoke;
    padding: 8em 2em;
  }

  @keyframes scroll {
    0% {transform: translateX(0);}
    100% {transform: translatex(-1000%)}
  }
</style>

<div class="slider">
  <div class="slide-track">
    {% for sponsor in site.data.sponsors %}
      <div class="slide">
        <img src="{{sponsor}}" alt="{{ sponsor }}" />
      </div>
    {% endfor %}
  </div>
</div>
