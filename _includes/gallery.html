<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
<link href="https://unpkg.com/nanogallery2@2.4.2/dist/css/nanogallery2.min.css" rel="stylesheet">
<script src="https://unpkg.com/nanogallery2@2.4.2/dist/jquery.nanogallery2.min.js"></script>
<div id="gallery">Als hier na een tijd niks staat, ondersteunt uw browser de galerij niet.</div>
<script>
  jQuery(document).ready(() => {
    jQuery('#gallery').nanogallery2({
      kind: 'flickr',
      userID: '{{ include.userID }}',
      thumbnailHeight: '300',
      thumbnailWidth: 'auto',
      galleryDisplayMode: 'pagination',
      galleryMaxRows: 2,
      gallerySorting: 'random',
      thumbnailAlignment: 'center',
          thumbnailBorderHorizontal: 0, thumbnailBorderVertical: 0,
          thumbnailGutterWidth : 15 , thumbnailGutterHeight : 15,

      // ALBUM LABELS (Only for albums, solid background, no transparency)
      thumbnailL1Label: { 
        display: true, 
        valign: 'bottom', 
        hideIcons: true, 
        titleFontSize: '1.5em', 
        align: 'center',
        titleMultiLine: true, 
        displayDescription: false,
        background: '#333', // Solid background color
        titleColor: '#fff',
        padding: '10px', // Adds space for better readability
        borderRadius: '4px'
      },

      // PHOTO LABELS (Hidden to avoid clutter)
      thumbnailLabel: { 
        display: false 
      },

      thumbnailToolbarImage: { 
        // topLeft: 'select', 
        // bottomRight: 'featured,display,download' 
      },

      // DISPLAY ANIMATION
      galleryDisplayTransition: 'slideUp',
          galleryDisplayTransitionDuration: 1000,
          thumbnailDisplayTransition: 'scaleDown',
          thumbnailDisplayTransitionDuration: 300,
          thumbnailDisplayInterval: 50,
      // thumbnailDisplayOrder: 'rowByRow',
      

      // HOVER EFFECTS (No sepia, better scaling to prevent black borders)
      thumbnailHoverEffect2: 'image_scale_1.00_1.20_1000',
      
      touchAnimation: true,
      touchAutoOpenDelay: 800,

      // THEME STYLES
      galleryTheme: {
        thumbnail: { borderRadius: '10px', background: '#fff', titleShadow : 'none', titleColor: '#000', labelBackground: '#ff0' },
        navigationPagination: { 
          background: '#444', 
          color: '#fff', 
          colorHover: '#ddd', 
          borderRadius: '6px', 
          padding: '8px'
        }
      }
    });
  });
</script>
