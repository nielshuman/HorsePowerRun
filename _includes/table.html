<div id="participants-table"></div>
<script src="/js/csv.js"></script>
<script type="text/javascript">
	let url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSjQLn6Cx_VpIX4PZmZ3Gmqg3ry6jpGu6CH1Zr3ESi3G_zJvPTOUC1b1Ya9cnFU6fETRSwWCbpmbVzL/pub?output=csv';

	let request = new XMLHttpRequest();
	request.open("GET", url, true);
	request.onload = () => {
	    if (request.status != 200) return;
	    document.getElementById('participants-table').innerHTML = buildTable(request.response);
	};

	request.send();
</script>
