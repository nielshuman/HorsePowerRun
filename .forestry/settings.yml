---
new_page_extension: md
auto_deploy: false
admin_path: ''
webhook_url: 
sections:
- type: heading
  label: Pagina's
- type: directory
  path: en
  label: Engels
  create: documents
  match: "**/*.md"
  new_doc_ext: md
- type: directory
  path: nl
  label: Nederlands
  create: documents
  match: "**/*.md"
  new_doc_ext: md
- type: document
  path: _config.yaml
  label: Config
upload_dir: assets/img
public_path: "/assets/img"
front_matter_path: ''
use_front_matter_path: false
file_template: ":filename:"
build:
  preview_env:
  - JEKYLL_ENV=staging
  preview_output_directory: _site
  install_dependencies_command: gem install bundler:1.17.2 && bundle install --path
    vendor/bundle
  preview_docker_image: forestryio/ruby:2.6
  mount_path: "/srv"
  working_dir: "/srv"
  instant_preview_command: gem install bundler:1.17.2 && bundle exec jekyll serve
    --drafts --unpublished --future
